# SignalLogic Deployment Manifest
# Copy and edit this file for each deployment instance.
# Searched automatically at startup (walk up from package root).
# Override path with: SIGNALLOGIC_CONFIG=/path/to/deployment.yaml

deployment:
  name: "SignalLogic"
  version: "1"

location:
  lat: 34.0522
  lon: -118.2437
  label: "Los Angeles, CA"
  timezone: "UTC"

baseline:
  # Minimum observations before each tier is considered "warm".
  # The system runs in all modes regardless — these thresholds only
  # affect the readiness flag shown in CycleResult and the dashboard.
  min_meter_cycles: 30        # ~1 minute at 2s hydro_meter interval
  min_natural_records: 4      # ~4 emit_natural_raw_once calls

domain:
  # Business domain channels active for this deployment.
  # Regional pressure is Phase 2 (pending data source decision).
  channels:
    - "volatility_pressure"
    - "capital_cost"
    - "energy_pressure"
    - "maritime_pressure"
    - "food_cold_chain"
    - "infrastructure_materials"
