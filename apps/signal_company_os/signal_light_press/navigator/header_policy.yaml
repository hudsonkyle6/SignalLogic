authoritative_roots:
  - signal_light_press/codex
  - signal_light_press/editions
  - signal_light_press/contracts
  - signal_light_press/manifests
  - signal_light_press/registers

  

exclude_globs:
  - "**/_mirror_backups/**"
  - "**/_archive_*/**"
  - "**/chronicles/**"
  - "**/fieldnotes/**"
  - "**/publications/**"
  - "**/*.csv"
  - "**/*.png"
  - "**/*.tar.gz"

required_fields:
  default:
    - "Authority"
    - "Status"
  canon:
    - "Authority"
    - "Classification"
    - "Scope"
    - "Status"
    - "Amendment Rule"
    - "Effective Date"
  doctrine:
    - "Authority"
    - "Classification"
    - "Scope"
    - "Status"
  guide:
    - "Authority"
    - "Classification"
    - "Scope"
    - "Status"
  policy:
    - "Authority"
    - "Classification"
    - "Scope"
    - "Status"

seal_allowed_classes:
  - canon
  - policy
  - register

header_contract_path: "signal_light_press/HEADER_CONTRACT.md"
