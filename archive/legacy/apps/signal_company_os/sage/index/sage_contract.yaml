SageContract:
  Version: "1.0.0"
  Purpose: "Interpretive coherence, not decision or control"

  Inputs:
    Oracle:
      - oracle_snapshot.json
      - resonance_feed.csv
      - amplitude_feed.csv
      - hst_feed.csv
    HumanContext:
      - rhythms/annotations/human_annotation.csv
      - rhythms/annotations/household_annotation.csv
      - rhythms/annotations/seasonal_annotation.csv

  Outputs:
    Allowed:
      - MorningBrief
      - DailyReport
      - EndOfDayReflection
      - ArchiveLogs
    Forbidden:
      - Commands
      - Allocations
      - Predictions
      - ExecutionFlags

  InterpretationRules:
    - "All outputs must cite Oracle inputs"
    - "Confidence must be qualified by G(t)"
    - "No single-day signal may be treated as regime change"
    - "Constraints must be phrased as non-actions"

  Authority:
    Kernel: "Signal Light Press"
    Override: "Human only"
